# CI/CD 工作流名称
name: Next.js 构建测试 & 线上生产环境部署

# 该 CI/CD 在什么情况下触发
on:
  push:
    branches:
      - main
  workflow_dispatch: # 支持手动触发

jobs:
  # 类型检查
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run type-check

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: pnpm run build

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.WENDAO_CI }}

      - name: Deploy to server
        run: |
          # 将 standalone 产物同步到服务器
          rsync -azP --delete \
            --exclude='.env*' \
            .next/standalone/ \
            root@139.196.216.224:/root/code/psy-platform/

          # 单独同步 static 和 public（standalone 不自动包含这些）
          rsync -azP --delete \
            .next/static/ \
            root@139.196.216.224:/root/code/psy-platform/.next/static/

          rsync -azP \
            public/ \
            root@139.196.216.224:/root/code/psy-platform/public/

          # 同步 PM2 配置和 prisma schema
          rsync -azP \
            ecosystem.config.js \
            root@139.196.216.224:/root/code/psy-platform/

          rsync -azP \
            prisma/ \
            root@139.196.216.224:/root/code/psy-platform/prisma/

      - name: Restart PM2
        run: |
          ssh -o StrictHostKeyChecking=no root@139.196.216.224 << 'EOF'
            cd /root/code/psy-platform
            pm2 restart psy
            pm2 save
          EOF
