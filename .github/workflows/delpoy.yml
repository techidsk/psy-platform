# CI/CD 工作流名称
name: Next.js 构建测试 & 线上生产环境部署

# 该 CI/CD 在什么情况下触发
on:
  push:
    branches:
      - main
  workflow_dispatch: # 支持手动触发

jobs:
  # 类型检查
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run type-check

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: pnpm run build

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.WENDAO_CI }}

      - name: Deploy to server
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no"
          SERVER="root@139.196.216.224"
          DEPLOY_DIR="/root/code/psy-platform"

          # 清理服务器上旧产物（只删部署相关目录，保留 .env 等配置）
          ssh $SSH_OPTS $SERVER "
            cd $DEPLOY_DIR && \
            rm -rf .next node_modules server.js package.json public prisma ecosystem.config.js 2>/dev/null || true
          "

          # standalone 产物传输
          tar -cf - -C .next/standalone . \
            | ssh $SSH_OPTS $SERVER "cd $DEPLOY_DIR && tar -xf -"

          # static 和 public 单独传（standalone 不包含这些）
          tar -cf - .next/static public ecosystem.config.js prisma \
            | ssh $SSH_OPTS $SERVER "cd $DEPLOY_DIR && tar -xf -"

      - name: Restart PM2
        run: |
          ssh -o StrictHostKeyChecking=no root@139.196.216.224 << 'EOF'
            cd /root/code/psy-platform
            pm2 delete psy 2>/dev/null || true
            pm2 start ecosystem.config.js
            pm2 save
          EOF
