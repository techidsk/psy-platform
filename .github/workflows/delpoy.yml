# CI/CD 工作流名称
name: Next.js 构建测试 & 线上生产环境部署

# 该 CI/CD 在什么情况下触发
on:
  push:
    branches:
      - main
  workflow_dispatch: # 支持手动触发

jobs:
  # 类型检查
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm run type-check

  deploy:
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: pnpm run build

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.WENDAO_CI }}

      - name: Deploy to server
        run: |
          SSH_OPTS="-o StrictHostKeyChecking=no"
          SERVER="root@139.196.216.224"
          DEPLOY_DIR="/root/code/psy-platform"

          # 打包产物（排除 .env 文件）
          tar -czf deploy.tar.gz \
            -C .next/standalone . \
            --transform='s,^,$DEPLOY_DIR/,' 2>/dev/null || true

          # 先清理服务器上旧的产物（保留 .env 文件）
          ssh $SSH_OPTS $SERVER "
            cd $DEPLOY_DIR && \
            find . -maxdepth 1 -not -name '.env*' -not -name '.' -not -name '..' -exec rm -rf {} + 2>/dev/null || true
          "

          # 上传 standalone 产物
          scp -r $SSH_OPTS .next/standalone/* $SERVER:$DEPLOY_DIR/

          # 上传 static 资源
          ssh $SSH_OPTS $SERVER "mkdir -p $DEPLOY_DIR/.next/static"
          scp -r $SSH_OPTS .next/static/* $SERVER:$DEPLOY_DIR/.next/static/

          # 上传 public 目录
          ssh $SSH_OPTS $SERVER "mkdir -p $DEPLOY_DIR/public"
          scp -r $SSH_OPTS public/* $SERVER:$DEPLOY_DIR/public/

          # 上传 PM2 配置和 prisma
          scp $SSH_OPTS ecosystem.config.js $SERVER:$DEPLOY_DIR/
          scp -r $SSH_OPTS prisma $SERVER:$DEPLOY_DIR/

      - name: Restart PM2
        run: |
          ssh -o StrictHostKeyChecking=no root@139.196.216.224 << 'EOF'
            cd /root/code/psy-platform
            pm2 restart psy
            pm2 save
          EOF
